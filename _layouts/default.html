<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body { background-color: #f4f4f4; margin: 0; padding: 0; font-family: sans-serif; }
    
    /* کانتینر اصلی که عرض را محدود به 1200 پیکسل می‌کند */
    .site-wrapper { max-width: 1200px; margin: 0 auto; background: #0d1b2a; }

    /* بنر دقیقاً هم‌عرض سایت می‌شود */
    .header-banner { width: 100%; display: block; }
    
    /* منو */
    .satco-nav { background-color: #0d1b2a; padding: 15px 20px; display: flex; border-top: 1px solid #1c3650; }
    .satco-nav a { color: white; text-decoration: none; margin-right: 30px; font-weight: 600; font-size: 14px; }
    .satco-nav a:hover { color: #d4af37; }

    /* بدنه سفید */
    main { background: white; padding: 40px 20px; }
  </style>
</head>
<body>

  <div class="site-wrapper">
    <img src="{{ '/Banner.png' | relative_url }}" alt="SATCO Banner" class="header-banner">

    <nav class="satco-nav">
      <a href="{{ '/' | relative_url }}">HOME</a>
      <a href="{{ '/02_commodities.html' | relative_url }}">COMMODITIES</a>
      <a href="{{ '/03_market_insights.html' | relative_url }}">MARKET INSIGHTS</a>
      <a href="{{ '/04_our_shipments.html' | relative_url }}">OUR SHIPMENTS</a>
      <a href="{{ '/05_contact.html' | relative_url }}">CONTACT US</a>
    </nav>
  </div>

  <main style="max-width: 1200px; margin: 0 auto;">
    {{ content }}
  </main>

</body>
</html>
