<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

  <!-- بنر اصلی سایت شما با اصلاح پس‌زمینه و ابعاد بنر جدید -->
  <header style="text-align: center; background-color: #0d1b2a; padding: 10px 0;">
    <img src="{{ '/Banner.png' | relative_url }}" alt="SATCO Banner" style="max-width: 100%; height: auto; display: block; margin: 0 auto; object-fit: contain;">
  </header>

  <!-- منوی جدید و شیک سورمه‌ای و طلایی -->
  <nav class="satco-nav-container">
    <ul class="satco-menu">
      <li><a href="{{ '/' | relative_url }}">HOME</a></li>
      <li><a href="{{ '/02_commodities.html' | relative_url }}">COMMODITIES</a></li>
      <li><a href="{{ '/03_market_insights.html' | relative_url }}">MARKET INSIGHTS</a></li>
      <li><a href="{{ '/04_our_shipments.html' | relative_url }}">OUR SHIPMENTS</a></li>
      <li><a href="{{ '/05_contact.html' | relative_url }}">CONTACT US</a></li>
    </ul>
  </nav>

  <!-- بخش نمایش محتوای صفحات -->
  <main style="max-width: 1200px; margin: 30px auto; padding: 0 20px;">
    {{ content }}
  </main>

  <style>
    /* استایل‌های اختصاصی منوی ساتکو */
    .satco-nav-container {
      background-color: #0d1b2a; /* رنگ سورمه‌ای تیره */
      width: 100%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 0;
      margin: 0;
    }

    .satco-menu {
      list-style: none;
      display: flex;
      justify-content: flex-start; /* چپ به راست */
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 20px;
    }

    .satco-menu li {
      margin-right: 30px;
    }

    .satco-menu li a {
      color: #ffffff;
      text-decoration: none;
      font-family: 'Arial', sans-serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    /* افکت طلایی هنگام رفتن ماوس روی منو */
    .satco-menu li a:hover {
      color: #d4af37;
    }
  </style>

</body>
</html>
