<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body { background-color: #f4f4f4; margin: 0; padding: 0; font-family: sans-serif; }
    
    /* تنظیمات بنر با استفاده از روش Background-Image که باعث می‌شود عکس همیشه فیت باشد */
    .hero-banner { 
      width: 100%; 
      height: 350px; 
      background-image: url('{{ '/Banner.png' | relative_url }}'); 
      background-size: cover; 
      background-position: center; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-end; 
    }
    
    /* منو که حالا روی بنر قرار می‌گیرد */
    .satco-nav { 
      background: rgba(13, 27, 42, 0.85); /* کمی شفاف تا زیبایی عکس مشخص باشد */
      padding: 15px 0; 
      text-align: center; 
    }
    .satco-nav a { 
      color: #ffffff; 
      margin: 0 20px; 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 14px; 
      letter-spacing: 1px;
    }
    .satco-nav a:hover { color: #d4af37; }

    /* محتوای سایت */
    .main-content { max-width: 1200px; margin: 30px auto; padding: 20px; background: white; border-radius: 5px; }
  </style>
</head>
<body>

  <header class="hero-banner">
    <nav class="satco-nav">
      <a href="{{ '/' | relative_url }}">HOME</a>
      <a href="{{ '/02_commodities.html' | relative_url }}">COMMODITIES</a>
      <a href="{{ '/03_market_insights.html' | relative_url }}">MARKET INSIGHTS</a>
      <a href="{{ '/04_our_shipments.html' | relative_url }}">OUR SHIPMENTS</a>
      <a href="{{ '/05_contact.html' | relative_url }}">CONTACT US</a>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

</body>
</html>
