<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <style>
    body { background-color: #f4f4f4; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    
    /* تنظیم بنر: محدود به عرض 1200 پیکسل و ارتفاع ثابت */
    .header-container { 
      max-width: 1200px; 
      margin: 20px auto 0 auto; /* فاصله از بالا */
      text-align: center; 
    }
    .header-container img { 
      max-width: 100%; 
      max-height: 250px; 
      display: block; 
      border-radius: 8px; /* کمی گرد کردن گوشه‌ها برای زیبایی */
    }

    /* تنظیم منو: فاصله از بنر */
    .satco-nav-container {
      background-color: #0d1b2a;
      max-width: 1200px;
      margin: 20px auto; /* فاصله از بنر */
      border-radius: 5px;
    }
    
    .satco-menu {
      list-style: none;
      display: flex;
      padding: 15px 20px;
      margin: 0;
    }

    .satco-menu li { margin-right: 30px; }
    .satco-menu li a { color: #ffffff; text-decoration: none; font-weight: 600; font-size: 14px; }
    .satco-menu li a:hover { color: #d4af37; }

    main { max-width: 1200px; margin: 0 auto; padding: 20px; background: white; }
  </style>
</head>
<body>

  <header class="header-container">
    <img src="{{ '/Banner.png' | relative_url }}" alt="SATCO Banner">
  </header>

  <nav class="satco-nav-container">
    <ul class="satco-menu">
      <li><a href="{{ '/' | relative_url }}">HOME</a></li>
      <li><a href="{{ '/02_commodities.html' | relative_url }}">COMMODITIES</a></li>
      <li><a href="{{ '/03_market_insights.html' | relative_url }}">MARKET INSIGHTS</a></li>
      <li><a href="{{ '/04_our_shipments.html' | relative_url }}">OUR SHIPMENTS</a></li>
      <li><a href="{{ '/05_contact.html' | relative_url }}">CONTACT US</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

</body>
</html>
